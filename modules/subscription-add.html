<div class="subscription-container">
  <div class="subscription-header">
    <h1><i class="fas fa-plus-circle"></i> Add New Subscription / License</h1>
    <p>Register software licenses, SaaS subscriptions, domain renewals, and service contracts</p>
  </div>

  <form id="subscriptionForm" onsubmit="event.preventDefault(); submitSubscription();">
    <div class="form-grid-2">
      <div class="form-group">
        <label><i class="fas fa-tag"></i> Subscription/License Name *</label>
        <input type="text" id="subName" placeholder="e.g., Microsoft 365 Business Premium" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-layer-group"></i> Category *</label>
        <select id="subCategory" required>
          <option value="">Select Category</option>
          <option value="Software License">Software License</option>
          <option value="SaaS Subscription">SaaS Subscription</option>
          <option value="Domain Renewal">Domain Renewal</option>
          <option value="SSL Certificate">SSL Certificate</option>
          <option value="Maintenance Contract">Maintenance Contract</option>
          <option value="Cloud Service">Cloud Service</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label><i class="fas fa-building"></i> Vendor/Provider</label>
        <input type="text" id="vendor" placeholder="e.g., Microsoft, Google, GoDaddy">
      </div>
      <div class="form-group">
        <label><i class="fas fa-code-branch"></i> License Key / Reference</label>
        <input type="text" id="licenseKey" placeholder="Optional">
      </div>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label><i class="fas fa-calendar-plus"></i> Purchase/Start Date *</label>
        <input type="date" id="startDate" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar-check"></i> Expiry/Renewal Date *</label>
        <input type="date" id="expiryDate" required>
      </div>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label><i class="fas fa-dollar-sign"></i> Annual Cost (GH₵) *</label>
        <input type="number" id="annualCost" step="0.01" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-sync-alt"></i> Renewal Type</label>
        <select id="renewalType">
          <option value="Auto-renew">Auto-renew</option>
          <option value="Manual Renewal">Manual Renewal</option>
          <option value="One-time">One-time (No renewal)</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label><i class="fas fa-users"></i> Assigned To / Department</label>
      <input type="text" id="assignedTo" placeholder="e.g., IT Dept, Finance, Marketing">
    </div>

    <div class="form-group">
      <label><i class="fas fa-sticky-note"></i> Notes</label>
      <textarea id="notes" rows="2" placeholder="Additional details..."></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="submit-btn"><i class="fas fa-save"></i> Save Subscription</button>
      <button type="button" class="reset-btn" onclick="resetSubscriptionForm()"><i class="fas fa-undo"></i> Reset</button>
    </div>
  </form>
</div>

<!-- Toast Message Container -->
<div id="subToast" class="sub-toast" style="display: none;">
  <span id="subToastMessage"></span>
</div>
