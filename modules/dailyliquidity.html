<div class="liquidity-container">
    <!-- header with upload button and date selector -->
    <div class="liquidity-header">
        <div class="liquidity-header-left">
            <button class="upload-btn" id="uploadBtn" title="Upload liquidity data (JSON/CSV)">
                <i class="fas fa-cloud-upload-alt"></i> Upload
            </button>
            <h1><i class="fas fa-water"></i> Daily Liquidity</h1>
        </div>
        <div class="week-selector">
            <label for="weekEndingDate"><i class="far fa-calendar-alt"></i> Week Ending:</label>
            <input type="date" id="weekEndingDate" value="">
        </div>
    </div>

    <!-- main table -->
    <div class="table-responsive">
        <table id="liquidityTable">
            <thead>
                <tr>
                    <th style="text-align:left; padding-left:8px; min-width:140px; width:160px;">Description</th>
                    <th id="col1">Thu</th>
                    <th id="col2">Fri</th>
                    <th id="col3">Sat</th>
                    <th id="col4">Sun</th>
                    <th id="col5">Mon</th>
                    <th id="col6">Tue</th>
                    <th id="col7">Wed</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- data will be injected by JS -->
            </tbody>
        </table>
    </div>

    <div class="footer-note">
        <span><i class="far fa-calendar-check"></i> Week ending: <span id="footerWeekEnding">Loading...</span></span>
        <span><i class="fas fa-info-circle"></i> All figures in GH₵</span>
        <span><i class="fas fa-print" style="cursor:pointer;" onclick="window.print();"></i> Print</span>
    </div>
</div>

<!-- hidden file input -->
<input type="file" id="fileInput" accept=".json,.csv" style="display:none;">
