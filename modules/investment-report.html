<div class="investment-report-container">
  <div class="report-header">
    <h1>Investment Reports</h1>
  </div>

  <!-- Tabs and Controls Row - Reordered: Full first, Purchase last -->
  <div class="report-controls-row">
    <div class="report-tabs">
      <button class="tab-btn active" onclick="switchInvestmentReportTab('fullReport')">
        <i class="fas fa-chart-bar"></i> Full
      </button>
      <button class="tab-btn" onclick="switchInvestmentReportTab('interestReport')">
        <i class="fas fa-percent"></i> Interest
      </button>
      <button class="tab-btn" onclick="switchInvestmentReportTab('maturedReport')">
        <i class="fas fa-check-circle"></i> Matured
      </button>
      <button class="tab-btn" onclick="switchInvestmentReportTab('purchaseReport')">
        <i class="fas fa-receipt"></i> Purchase
      </button>
    </div>

    <div class="report-controls">
      <!-- Full Report Controls -->
      <div class="control-group" id="fullReportControls" style="display: flex;">
        <div class="compact-date-input">
          <label for="fullReportToDate">As At:</label>
          <input type="date" id="fullReportToDate" onchange="loadFullInvestmentReport()">
        </div>
        <div class="compact-selector">
          <label for="reportTypeSelect">Group:</label>
          <select id="reportTypeSelect" onchange="handleReportTypeChange()">
            <option value="byType" selected>By Type</option>
            <option value="byBank">By Bank</option>
            <option value="byDuration">By Duration</option>
          </select>
        </div>
        <button type="button" class="print-btn-small" onclick="printUtils.printInvestmentReport('fullReport')">
          <i class="fas fa-print"></i>
        </button>
      </div>

      <!-- Interest Report Controls -->
      <div class="control-group" id="interestControls" style="display: none;">
        <div class="compact-date-input">
          <label for="interestFromDate">From:</label>
          <input type="date" id="interestFromDate" onchange="loadInterestReport()">
        </div>
        <div class="compact-date-input">
          <label for="interestToDate">To:</label>
          <input type="date" id="interestToDate" onchange="loadInterestReport()">
        </div>
        <div class="compact-selector">
          <label for="interestGroupSelect">Group:</label>
          <select id="interestGroupSelect" onchange="loadInterestReport()">
            <option value="byType" selected>By Type</option>
            <option value="byBank">By Bank</option>
          </select>
        </div>
        <button type="button" class="print-btn-small" onclick="printUtils.printInvestmentReport('interestReport')">
          <i class="fas fa-print"></i>
        </button>
      </div>

      <!-- Matured Report Controls -->
      <div class="control-group" id="maturedControls" style="display: none;">
        <div class="control-info">
          <i class="fas fa-info-circle"></i>
          <span>Matured investments</span>
        </div>
        <button type="button" class="print-btn-small" onclick="printUtils.printInvestmentReport('maturedReport')">
          <i class="fas fa-print"></i>
        </button>
      </div>

      <!-- Purchase Report Controls -->
      <div class="control-group" id="purchaseControls" style="display: none;">
        <div class="compact-date-input">
          <label for="purchaseFromDate">From:</label>
          <input type="date" id="purchaseFromDate" onchange="loadPurchaseReport()">
        </div>
        <div class="compact-date-input">
          <label for="purchaseToDate">To:</label>
          <input type="date" id="purchaseToDate" onchange="loadPurchaseReport()">
        </div>
        <button type="button" class="print-btn-small" onclick="printUtils.printInvestmentReport('purchaseReport')">
          <i class="fas fa-print"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Full Report Tab (Now First) -->
  <div class="tab-content active" id="fullReport">
    <div id="fullReportContainer"></div>
  </div>

  <!-- Interest Report Tab -->
  <div class="tab-content" id="interestReport">
    <div id="interestReportContainer"></div>
  </div>

  <!-- Matured Investments Tab -->
  <div class="tab-content" id="maturedReport">
    <div class="report-table-wrapper" id="maturedReportTable">
      <table class="report-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Bank</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Rate</th>
            <th>Days</th>
            <th>Inv. Date</th>
            <th>Maturity Date</th>
            <th>Maturity Amt</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="maturedReportBody">
          <tr><td colspan="10" class="loading-cell">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Purchase Report Tab (Now Last) -->
  <div class="tab-content" id="purchaseReport">
    <div class="report-table-wrapper" id="purchaseReportTable">
      <table class="report-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Bank</th>
            <th>Type</th>
            <th>Amount (GHc)</th>
            <th>Rate (%)</th>
            <th>Days</th>
            <th>Inv. Date</th>
          </tr>
        </thead>
        <tbody id="purchaseReportBody">
          <tr><td colspan="7" class="loading-cell">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Action Dropdown Portal -->
  <div class="action-dropdown-portal" id="investmentActionPortal" style="display: none;"></div>
</div>

<!-- Rollover Modal - Compact -->
<div class="rollover-modal" id="rolloverModal" style="display: none;">
  <div class="rollover-modal-content">
    <div class="rollover-modal-header">
      <h2>Rollover Investment</h2>
      <button class="rollover-modal-close" onclick="closeRolloverModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <form id="rolloverForm" onsubmit="event.preventDefault(); submitRolloverInvestment();">
      <div class="form-row-two">
        <div class="form-group">
          <label for="rolloverInvestmentType">Type:</label>
          <select id="rolloverInvestmentType" onchange="handleRolloverInvestmentTypeChange()" required>
            <option value="">Select</option>
            <option value="Fixed Deposit">Fixed Deposit</option>
            <option value="Treasury Bills">Treasury Bills</option>
            <option value="Bonds">Bonds</option>
          </select>
        </div>
        <div class="form-group">
          <label for="rolloverInvestmentDate">Inv. Date:</label>
          <input type="date" id="rolloverInvestmentDate" required onchange="calculateRolloverMaturityDate()">
        </div>
      </div>
      <div class="form-row-two">
        <div class="form-group">
          <label for="rolloverInvestmentCode">Code:</label>
          <input type="text" id="rolloverInvestmentCode" readonly placeholder="Auto">
        </div>
        <div class="form-group">
          <label for="rolloverBankName">Bank:</label>
          <select id="rolloverBankName" required>
            <option value="">Select</option>
            <option value="Fidelity">Fidelity</option>
            <option value="CBG">CBG</option>
            <option value="Ecobank">Ecobank</option>
            <option value="GCB">GCB</option>
          </select>
        </div>
      </div>
      <div class="form-row-two">
        <div class="form-group">
          <label for="rolloverAmount">Amount (GHc):</label>
          <input type="number" id="rolloverAmount" step="0.01" placeholder="0.00" required oninput="calculateRolloverMaturityAmount()">
        </div>
        <div class="form-group">
          <label for="rolloverInterestRate">Rate (%):</label>
          <input type="number" id="rolloverInterestRate" step="0.01" placeholder="0.00" required oninput="calculateRolloverMaturityAmount()">
        </div>
      </div>
      <div class="form-row-two">
        <div class="form-group">
          <label for="rolloverDuration">Days:</label>
          <input type="number" id="rolloverDuration" step="1" placeholder="0" required oninput="calculateRolloverMaturityDate()">
        </div>
        <div class="form-group">
          <label for="rolloverMaturityDate">Maturity:</label>
          <input type="date" id="rolloverMaturityDate" required onchange="calculateRolloverMaturityAmount()">
        </div>
      </div>
      <div class="form-row-two">
        <div class="form-group">
          <label>Interest:</label>
          <input type="text" id="rolloverInterestAmount" readonly>
        </div>
        <div class="form-group">
          <label>Maturity:</label>
          <input type="text" id="rolloverMaturityAmount" readonly>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-btn-cancel" onclick="closeRolloverModal()">Cancel</button>
        <button type="submit" class="modal-btn-save">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Redeem Modal -->
<div class="rollover-modal" id="redeemModal" style="display: none;">
  <div class="rollover-modal-content">
    <div class="rollover-modal-header">
      <h2>Redeem Investment</h2>
      <button class="rollover-modal-close" onclick="closeRedeemModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <form id="redeemForm" onsubmit="event.preventDefault(); submitRedeemInvestment();">
      <div class="form-row-two">
        <div class="form-group">
          <label>Investment Code:</label>
          <input type="text" id="redeemInvestmentCode" readonly>
        </div>
        <div class="form-group">
          <label>Bank:</label>
          <input type="text" id="redeemBankName" readonly>
        </div>
      </div>
      <div class="form-row-two">
        <div class="form-group">
          <label>Type:</label>
          <input type="text" id="redeemInvestmentType" readonly>
        </div>
        <div class="form-group">
          <label>Amount:</label>
          <input type="text" id="redeemAmount" readonly>
        </div>
      </div>
      <div class="form-row-two">
        <div class="form-group">
          <label>Maturity Date:</label>
          <input type="text" id="redeemMaturityDate" readonly>
        </div>
        <div class="form-group">
          <label>Maturity Amount:</label>
          <input type="text" id="redeemMaturityAmount" readonly>
        </div>
      </div>
      <div class="form-group">
        <label>Redeem Date:</label>
        <input type="date" id="redeemDate" required>
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-btn-cancel" onclick="closeRedeemModal()">Cancel</button>
        <button type="submit" class="modal-btn-save">Confirm Redeem</button>
      </div>
    </form>
  </div>
</div>

<style>

  }
